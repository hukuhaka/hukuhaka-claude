<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Inlined from assets/tokens.css — single source of truth.
   IBM Carbon Design System (templates/DESIGN-IBM.md).
   Keep in sync with tokens.css when extending.
   ============================================================ */

:root {
  --primary: #0f62fe; --primary-hover: #0353e9; --primary-active: #002d9c; --blue-on-dark: #78a9ff;
  --canvas: #ffffff; --surface-1: #f4f4f4; --surface-2: #e0e0e0;
  --surface-tinted: #f2f4f8;
  --inverse-canvas: #161616; --inverse-surface-1: #262626; --inverse-surface-2: #393939;
  --hairline: #e0e0e0; --hairline-strong: #a8a8a8;
  --ink: #161616; --ink-muted: #525252; --ink-subtle: #8c8c8c; --on-primary: #ffffff;
  --inverse-ink: #ffffff; --inverse-ink-muted: #c6c6c6; --inverse-ink-subtle: #8d8d8d;
  --semantic-success: #24a148; --semantic-warning: #f1c21b; --semantic-error: #da1e28; --semantic-info: #0f62fe;
  --syntax-key: #82cfff; --syntax-val: #fa8d75; --syntax-cmt: #8d8d8d; --syntax-tag: #d4bbff; --syntax-str: #6fdc8c;
  --font-sans: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --text-display-xl: 60px; --text-display-md: 42px; --text-card-title: 24px; --text-body-lg: 18px; --text-body: 16px; --text-body-sm: 14px; --text-button: 14px; --text-caption: 12px;
  --tracking-body: 0.16px; --tracking-caption: 0.32px;
  --line-height-table: 1.60; --line-height-table-dense: 1.30;
  --table-cell-pad-y: var(--space-sm); --table-cell-pad-y-dense: 6px;
  --space-xxs: 4px; --space-xs: 8px; --space-sm: 12px; --space-md: 16px; --space-lg: 24px; --space-xl: 32px; --space-xxl: 48px; --space-section: 96px;
  --r-none: 0; --r-xs: 2px; --r-sm: 4px;
  --z-nav: 10; --z-skip-link: 1000;
  --content-max: 1200px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--ink); background: var(--canvas); font-size: var(--text-body); line-height: 1.50; letter-spacing: var(--tracking-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
a { color: var(--primary); text-decoration: none; }
a:hover { color: var(--primary-hover); text-decoration: underline; }
a:active { color: var(--primary-active); }

a:focus-visible, button:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
.toc-list a:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; text-decoration: underline; }

.skip-link { position: absolute; left: -10000px; top: 0; z-index: var(--z-skip-link); padding: var(--space-sm) var(--space-md); background: var(--ink); color: var(--on-primary); font-family: var(--font-sans); font-size: var(--text-body-sm); letter-spacing: var(--tracking-body); }
.skip-link:focus { left: 0; outline: 2px solid var(--primary); outline-offset: -2px; }

.nav { position: sticky; top: 0; z-index: var(--z-nav); background: var(--canvas); border-bottom: 1px solid var(--hairline); height: 48px; display: flex; align-items: center; }
.nav-inner { max-width: var(--content-max); width: 100%; margin: 0 auto; padding: 0 var(--space-md); display: flex; align-items: center; gap: var(--space-md); }
.nav-mark { width: 28px; height: 28px; background: var(--primary); }
.nav-title { font-weight: 600; font-size: var(--text-body-sm); letter-spacing: var(--tracking-body); }
.nav-spacer { flex: 1; }
.nav-eyebrow { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); }

.utility-bar { background: var(--surface-1); border-bottom: 1px solid var(--hairline); height: 32px; display: flex; align-items: center; }
.utility-inner { max-width: var(--content-max); width: 100%; margin: 0 auto; padding: 0 var(--space-md); font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); display: flex; gap: var(--space-md); }

.hero { background: var(--canvas); border-bottom: 1px solid var(--hairline); }
.hero-inner { max-width: var(--content-max); margin: 0 auto; padding: var(--space-xxl) var(--space-md); }
.hero-eyebrow { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); margin-bottom: var(--space-md); }
.hero-title { font-size: var(--text-display-xl); line-height: 1.10; font-weight: 300; letter-spacing: -0.4px; margin: 0 0 var(--space-md); max-width: 880px; color: var(--ink); }
.hero-lead { font-size: var(--text-body-lg); line-height: 1.55; font-weight: 400; letter-spacing: 0; color: var(--ink-muted); max-width: 760px; margin: 0; }
.hero-meta { margin-top: var(--space-xl); display: flex; flex-wrap: wrap; font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); }
.hero-meta > span { padding: 0 var(--space-md); border-left: 1px solid var(--hairline); }
.hero-meta > span:first-child { padding-left: 0; border-left: none; }
.hero-meta b { color: var(--ink); font-weight: 600; }

main { max-width: var(--content-max); margin: 0 auto; padding: var(--space-xxl) var(--space-md) var(--space-section); }
section + section { margin-top: var(--space-section); }

.eyebrow { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); margin: 0 0 var(--space-xs); }
h2 { font-size: var(--text-display-md); line-height: 1.20; font-weight: 300; letter-spacing: 0; margin: 0 0 var(--space-md); color: var(--ink); }
h3 { font-size: var(--text-card-title); line-height: 1.33; font-weight: 400; margin: 0 0 var(--space-xs); color: var(--ink); }
h4 { font-size: var(--text-body-sm); line-height: 1.29; font-weight: 600; letter-spacing: var(--tracking-body); margin: var(--space-lg) 0 var(--space-xs); color: var(--ink); text-transform: none; }
p { margin: 0 0 var(--space-md); color: var(--ink-muted); letter-spacing: var(--tracking-body); }
p:last-child { margin-bottom: 0; }

.card { background: var(--canvas); border: 1px solid var(--hairline); padding: var(--space-lg); }
.card-soft { background: var(--surface-1); border: 1px solid var(--hairline); padding: var(--space-lg); }
.card-dark { background: var(--inverse-canvas); color: var(--inverse-ink); padding: var(--space-xl); }
.card.card-lg, .card-soft.card-lg, .card-dark.card-lg { padding: var(--space-xl); }
.card.card-xl, .card-soft.card-xl, .card-dark.card-xl { padding: var(--space-xxl); }
.card-dark h2, .card-dark h3, .card-dark h4 { color: var(--inverse-ink); }
.card-dark p { color: var(--inverse-ink-muted); }
.card-dark .eyebrow { color: var(--inverse-ink-muted); }
.card-dark code.inline { background: var(--inverse-surface-1); border-color: var(--inverse-surface-2); color: var(--inverse-ink); }

.band-tinted { background: var(--surface-tinted); color: var(--ink); margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); margin-top: var(--space-section); margin-bottom: var(--space-section); padding: var(--space-section) calc(50vw - 50% + var(--space-md)); border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); }
.band-tinted-inner { max-width: var(--content-max); margin: 0 auto; }
.band-tinted .card, .band-tinted .card-soft { background: var(--canvas); border-color: var(--hairline); }

.band-dark { background: var(--inverse-canvas); color: var(--inverse-ink); padding: var(--space-section) var(--space-md); margin: var(--space-section) calc(-1 * var(--space-md)); }
.band-dark-inner { max-width: var(--content-max); margin: 0 auto; }
.band-dark h2, .band-dark h3, .band-dark h4 { color: var(--inverse-ink); }
.band-dark p { color: var(--inverse-ink-muted); }
.band-dark .eyebrow { color: var(--inverse-ink-muted); }
.band-dark a { color: var(--blue-on-dark); }
.band-dark a:hover { color: var(--inverse-ink); }
.band-dark .card, .band-dark .card-soft { background: var(--inverse-surface-1); border-color: var(--inverse-surface-2); color: var(--inverse-ink); }
.band-dark .card p, .band-dark .card-soft p { color: var(--inverse-ink-muted); }
.band-dark code.inline { background: var(--inverse-surface-1); border-color: var(--inverse-surface-2); color: var(--inverse-ink); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-md); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-md); }
@media (max-width: 960px) { .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }

.toc { background: var(--canvas); border: 1px solid var(--hairline); padding: var(--space-md) var(--space-lg); }
.toc-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xs) var(--space-lg); font-size: var(--text-body-sm); letter-spacing: var(--tracking-body); }
.toc-list li { display: flex; align-items: center; gap: var(--space-xs); border-left: 2px solid transparent; padding-left: var(--space-xs); transition: border-color 120ms linear, background 120ms linear; }
.toc-list li::before { content: ""; display: inline-block; width: 8px; height: 1px; background: var(--primary); flex: 0 0 auto; }
.toc-list a { color: var(--ink-muted); transition: color 120ms linear; }
.toc-list a:hover { color: var(--ink); }
.toc-list li:has(a:target), .toc-list li:has(a[aria-current="location"]) { border-left-color: var(--primary); background: var(--surface-1); }
.toc-list a:target, .toc-list a[aria-current="location"] { color: var(--ink); font-weight: 600; }
@media (max-width: 700px) { .toc-list { grid-template-columns: 1fr; } }

table { width: 100%; border-collapse: collapse; font-size: var(--text-body-sm); line-height: var(--line-height-table); letter-spacing: var(--tracking-body); background: var(--canvas); border: 1px solid var(--hairline); }
table caption { text-align: left; padding: var(--space-sm) var(--space-md); font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); border-bottom: 1px solid var(--hairline); background: var(--surface-1); caption-side: top; }
thead th { text-align: left; font-family: var(--font-sans); font-size: var(--text-body-sm); font-weight: 600; color: var(--ink); background: var(--surface-1); padding: var(--table-cell-pad-y) var(--space-md); border-bottom: 1px solid var(--hairline); letter-spacing: var(--tracking-body); }
tbody td { padding: var(--table-cell-pad-y) var(--space-md); border-bottom: 1px solid var(--hairline); vertical-align: top; color: var(--ink); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: var(--surface-1); }
tbody td code { font-family: var(--font-mono); font-size: 13px; background: var(--canvas); border: 1px solid var(--hairline); padding: 1px 6px; color: var(--ink); letter-spacing: 0; }
tbody tr:nth-child(even) td code { background: var(--canvas); }
table.table-dense { line-height: var(--line-height-table-dense); }
table.table-dense thead th, table.table-dense tbody td { padding: var(--table-cell-pad-y-dense) var(--space-md); }
table.no-zebra tbody tr:nth-child(even) td { background: var(--canvas); }
table.no-zebra tbody tr:nth-child(even) td code { background: var(--canvas); }

pre { background: var(--inverse-canvas); color: var(--inverse-ink); padding: var(--space-lg); margin: var(--space-md) 0; font-family: var(--font-mono); font-size: 13px; line-height: 1.50; letter-spacing: 0; overflow-x: auto; border: 1px solid var(--inverse-surface-1); }
pre .c-key { color: var(--syntax-key); }
pre .c-val { color: var(--syntax-val); }
pre .c-cmt { color: var(--syntax-cmt); font-style: italic; }
pre .c-tag { color: var(--syntax-tag); }
pre .c-str { color: var(--syntax-str); }

code.inline { font-family: var(--font-mono); font-size: 13px; background: var(--canvas); border: 1px solid var(--hairline); padding: 1px 6px; color: var(--ink); letter-spacing: 0; }
.card-soft code.inline, .callout code.inline { background: var(--canvas); }

.callout { background: var(--surface-1); border-left: 3px solid var(--primary); padding: var(--space-md) var(--space-lg); color: var(--ink); }
.callout.warn { border-left-color: var(--semantic-warning); }
.callout.danger { border-left-color: var(--semantic-error); }
.callout.success { border-left-color: var(--semantic-success); }
.callout-eyebrow { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); margin-bottom: var(--space-xxs); }
.callout p { color: var(--ink); }

.check { list-style: none; padding: 0; margin: 0; border: 1px solid var(--hairline); }
.check li { padding: var(--space-sm) var(--space-md) var(--space-sm) calc(var(--space-md) + var(--space-lg)); position: relative; border-bottom: 1px solid var(--hairline); font-size: var(--text-body-sm); line-height: 1.29; letter-spacing: var(--tracking-body); background: var(--canvas); color: var(--ink); }
.check li:last-child { border-bottom: none; }
.check li::before { content: ""; position: absolute; left: var(--space-md); top: 16px; width: 14px; height: 14px; border: 1px solid var(--ink-subtle); background: var(--canvas); }

.badge { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-sans); font-size: var(--text-caption); font-weight: 400; letter-spacing: var(--tracking-caption); padding: 2px 8px; background: var(--surface-1); border: 1px solid var(--hairline); color: var(--ink-muted); }
.badge-primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
.badge-ink { background: var(--ink); color: var(--on-primary); border-color: var(--ink); }
.badge-success { background: var(--canvas); color: var(--semantic-success); border-color: var(--semantic-success); }
.badge-warn { background: var(--canvas); color: var(--semantic-warning); border-color: var(--semantic-warning); }
.badge-danger { background: var(--canvas); color: var(--semantic-error); border-color: var(--semantic-error); }

dl.kv { display: grid; grid-template-columns: 160px 1fr; gap: var(--space-xs) var(--space-md); font-size: var(--text-body-sm); margin: 0; letter-spacing: var(--tracking-body); }
dl.kv dt { font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); }
dl.kv dd { margin: 0; color: var(--ink); }

.spec-row { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin: var(--space-md) 0; }
table + .spec-row { margin-top: var(--space-lg); }

.svg-wrap { overflow-x: auto; border: 1px solid var(--hairline); background: var(--canvas); padding: var(--space-md); }
.svg-wrap > svg { min-width: 1080px; display: block; height: auto; }

.back-to-top { display: block; text-align: center; font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); padding: var(--space-md); letter-spacing: var(--tracking-caption); border-top: 1px solid var(--hairline); }
.back-to-top:hover { color: var(--primary); }

.btn { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-sans); font-size: var(--text-button); line-height: 1.30; font-weight: 400; letter-spacing: var(--tracking-caption); height: 40px; padding: 0 var(--space-md); border: 1px solid transparent; background: transparent; color: var(--ink); cursor: pointer; text-decoration: none; transition: background 70ms linear, color 70ms linear, border-color 70ms linear; }
.btn:hover { text-decoration: none; }
.btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }
.btn-primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: var(--on-primary); }
.btn-primary:active { background: var(--primary-active); border-color: var(--primary-active); }
.btn-secondary { background: var(--ink); color: var(--on-primary); border-color: var(--ink); }
.btn-secondary:hover { background: var(--ink-muted); border-color: var(--ink-muted); color: var(--on-primary); }
.btn-tertiary { background: transparent; color: var(--primary); border-color: var(--primary); }
.btn-tertiary:hover { background: var(--primary); color: var(--on-primary); }
.btn-tertiary:active { background: var(--primary-active); color: var(--on-primary); border-color: var(--primary-active); }
.btn-danger { background: var(--semantic-error); color: var(--on-primary); border-color: var(--semantic-error); }
.btn-danger:hover { background: #b81921; border-color: #b81921; color: var(--on-primary); }
.btn-danger:active { background: #750e13; border-color: #750e13; }
.btn-ghost { background: transparent; color: var(--primary); border-color: transparent; }
.btn-ghost:hover { background: var(--surface-1); color: var(--primary-hover); }
.btn-sm { height: 32px; padding: 0 var(--space-sm); font-size: var(--text-caption); }
.btn-lg { height: 48px; padding: 0 var(--space-lg); }

.input-label { display: block; font-family: var(--font-mono); font-size: var(--text-caption); color: var(--ink-muted); letter-spacing: var(--tracking-caption); margin: 0 0 var(--space-xs); }
.input-field { display: block; width: 100%; height: 40px; padding: 0 var(--space-md); font-family: var(--font-sans); font-size: var(--text-body-sm); letter-spacing: var(--tracking-body); background: var(--surface-1); border: 1px solid transparent; border-bottom: 1px solid var(--hairline-strong); color: var(--ink); }
.input-field::placeholder { color: var(--ink-subtle); }
.input-field:focus-visible { outline: 2px solid var(--primary); outline-offset: 0; border-bottom-color: var(--primary); }
.input-field:disabled { background: var(--surface-1); color: var(--ink-subtle); border-bottom-color: var(--hairline); cursor: not-allowed; }
.input-helper { font-family: var(--font-sans); font-size: var(--text-caption); color: var(--ink-muted); margin: var(--space-xxs) 0 0; letter-spacing: var(--tracking-body); }
.input-field.is-error { border-bottom-color: var(--semantic-error); }
.input-helper.is-error { color: var(--semantic-error); }

.tab-bar { display: flex; align-items: stretch; border-bottom: 1px solid var(--hairline); margin: 0 0 var(--space-lg); overflow-x: auto; }
.tab { flex: 0 0 auto; font-family: var(--font-sans); font-size: var(--text-body-sm); font-weight: 400; letter-spacing: var(--tracking-body); height: 40px; padding: 0 var(--space-md); background: transparent; color: var(--ink-muted); border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: color 70ms linear, border-color 70ms linear; }
.tab:hover { color: var(--ink); border-bottom-color: var(--hairline-strong); }
.tab.is-active, .tab[aria-selected="true"] { color: var(--ink); font-weight: 600; border-bottom-color: var(--primary); }
.tab:focus-visible { outline: 2px solid var(--primary); outline-offset: -2px; }

footer { background: var(--inverse-canvas); color: var(--inverse-ink-muted); padding: var(--space-xxl) var(--space-md); font-family: var(--font-sans); font-size: var(--text-body-sm); letter-spacing: var(--tracking-body); }
.footer-inner { max-width: var(--content-max); margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: var(--space-md); text-align: center; }
footer a { color: var(--inverse-ink); text-decoration: underline; }
footer code { font-family: var(--font-mono); color: var(--inverse-ink); }
</style>
</head>
<body>

<!-- ============================================================
     PLACEHOLDER MARKERS — fill these as you compose.
     Replace {{TITLE}}, {{NAV_TITLE}}, {{NAV_DATE}}, {{HERO_*}},
     {{TOC_ITEMS}}, {{SECTIONS}}, {{FOOTER_NOTE}} with content.
     Delete this comment block in the final output.
     ============================================================ -->

<a href="#main-content" class="skip-link">Skip to content</a>

<nav class="nav" aria-label="Document">
  <div class="nav-inner">
    <div class="nav-mark" aria-hidden="true"></div>
    <div class="nav-title">{{NAV_TITLE}}</div>
    <div class="nav-spacer"></div>
    <div class="nav-eyebrow">{{NAV_DATE}}</div>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">{{HERO_EYEBROW}}</p>
    <h1 class="hero-title">{{HERO_TITLE}}</h1>
    <p class="hero-lead">{{HERO_LEAD}}</p>
    <div class="hero-meta">
      {{HERO_META_ITEMS}}
    </div>
  </div>
</section>

<main id="main-content">

  <!-- Optional TOC. Delete this section if ≤4 body sections. -->
  <section>
    <p class="eyebrow">// CONTENTS</p>
    <h2>What's in this report</h2>
    <div class="toc">
      <ul class="toc-list">
        {{TOC_ITEMS}}
      </ul>
    </div>
  </section>

  <!-- One <section id="..."> per body section.
       See references/composition.md for the default arc and chapter rhythm.
       Reports of ≥6 sections MUST group sections into chapters (3-5 each)
       and alternate polarity at the CHAPTER boundary. Wrap the middle
       chapter in <div class="band-tinted"><div class="band-tinted-inner">…</div></div>
       — the band bleeds to viewport edges; inner restores max-width.
       Headings are sentence-case with NO trailing period. -->
  {{SECTIONS}}

  <p><a class="back-to-top" href="#main-content">↑ Back to top</a></p>

</main>

<footer>
  <div class="footer-inner">
    {{FOOTER_NOTE}}
  </div>
</footer>

</body>
</html>

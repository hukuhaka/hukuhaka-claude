<!-- ============================================================
component: chart-stacked (rb-stack / rb-legend, inside rb-chart)
purpose:   PART-TO-WHOLE message -> single stacked bar with the
           total annotated. Never a pie.
swap:      .ct title · .cs subtitle · spans: width % + label text ·
           legend labels + total. Series colors come ONLY from
           --accent / --accent-2 / --accent-3 / --sunk in that order;
           text on accent segments uses --surface, on light segments
           --ink / --ink-soft.
keep:      class names, structure, every var(--...) or
           color-mix(in oklch, var(--...)). Max 4 segments — more
           means the message is not part-to-whole.
needs:     foundations/<kit>.css + components/_base.css (rb-chart,
           rb-cnote live there) in page
craft:     references/craft/charts.md
============================================================ -->
<div class="rb-chart">
  <div class="ct">Request mix — part-to-whole</div>
  <div class="cs">Composition → stacked bar with total annotated (not a pie).</div>
  <div class="rb-stack">
    <span style="width:46%;background:var(--accent)">read 46%</span>
    <span style="width:31%;background:var(--accent-2)">write 31%</span>
    <span style="width:14%;background:var(--accent-3);color:var(--ink)">batch 14%</span>
    <span style="width:9%;background:var(--sunk);color:var(--ink-soft)">other 9%</span>
  </div>
  <div class="rb-legend"><span><i style="background:var(--accent)"></i>read</span><span><i style="background:var(--accent-2)"></i>write</span><span><i style="background:var(--accent-3)"></i>batch</span><span><i style="background:var(--sunk)"></i>other</span><span style="color:var(--ink-mute)">· total 1.20M req</span></div>
</div>
<style>
.rb-stack{display:flex;height:34px;border-radius:3px;overflow:hidden;box-shadow:inset 0 0 0 1px color-mix(in oklch, var(--ink) 8%, transparent)}
.rb-stack span{display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--surface)}
.rb-legend{display:flex;gap:var(--space-4);flex-wrap:wrap;margin-top:var(--space-3);font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.rb-legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:baseline}
</style>
